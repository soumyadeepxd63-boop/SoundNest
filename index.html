<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MusicFlow - Free Music Streaming</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            height: 100vh;
            overflow: hidden;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 240px;
            background: rgba(0,0,0,0.9);
            padding: 20px 0;
            transition: all 0.3s ease;
        }

        .sidebar.collapsed {
            width: 70px;
        }

        .logo {
            padding: 0 20px 30px;
            font-size: 24px;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-item {
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            border-left: 3px solid transparent;
        }

        .nav-item:hover, .nav-item.active {
            background: rgba(255,255,255,0.1);
            border-left-color: #1db954;
        }

        .nav-text {
            opacity: 1;
            transition: opacity 0.3s ease;
        }

        .sidebar.collapsed .nav-text {
            opacity: 0;
        }

        /* Main Content */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .top-bar {
            padding: 15px 30px;
            background: rgba(0,0,0,0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 500px;
            margin: 0 20px;
        }

        .search-box {
            width: 100%;
            padding: 12px 50px 12px 20px;
            border: none;
            border-radius: 25px;
            background: rgba(255,255,255,0.2);
            color: white;
            font-size: 16px;
        }

        .search-box::placeholder {
            color: rgba(255,255,255,0.7);
        }

        .search-icon {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        .profile {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #1db954;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        /* Content Area */
        .content-area {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            margin-bottom: 20px;
            font-size: 24px;
        }

        .tracks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .track-card {
            background: rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .track-card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.2);
        }

        .track-image {
            width: 100%;
            height: 150px;
            background: linear-gradient(45deg, #1db954, #1ed760);
            border-radius: 8px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
        }

        .track-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .track-artist {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
        }

        /* Player */
        .player {
            height: 90px;
            background: rgba(0,0,0,0.9);
            padding: 0 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .player-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .control-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            background: rgba(255,255,255,0.3);
        }

        .play-btn {
            width: 50px;
            height: 50px;
            background: #1db954;
        }

        .progress-container {
            flex: 1;
            max-width: 500px;
        }

        .progress-bar {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }

        .progress {
            height: 100%;
            background: #1db954;
            border-radius: 2px;
            width: 30%;
            transition: width 0.1s ease;
        }

        .time {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-top: 5px;
            color: rgba(255,255,255,0.7);
        }

        .volume-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .volume-bar {
            width: 100px;
            height: 4px;
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
            cursor: pointer;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .sidebar.collapsed {
                width: 0;
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Sidebar -->
        <div class="sidebar" id="sidebar">
            <div class="logo">
                <i class="fab fa-spotify"></i>
                <span class="nav-text">MusicFlow</span>
            </div>
            <div class="nav-item active" data-section="home">
                <i class="fas fa-home"></i>
                <span class="nav-text">Home</span>
            </div>
            <div class="nav-item" data-section="search">
                <i class="fas fa-search"></i>
                <span class="nav-text">Search</span>
            </div>
            <div class="nav-item" data-section="library">
                <i class="fas fa-book"></i>
                <span class="nav-text">Your Library</span>
            </div>
            <div class="nav-item toggle-sidebar">
                <i class="fas fa-bars"></i>
                <span class="nav-text">Collapse</span>
            </div>
        </div>

        <!-- Main Content -->
        <div class="main-content">
            <div class="top-bar">
                <div class="search-container">
                    <input type="text" class="search-box" placeholder="Search for songs, artists..." id="searchInput">
                    <i class="fas fa-search search-icon"></i>
                </div>
                <div class="profile" id="profileBtn">
                    <i class="fas fa-user"></i>
                </div>
            </div>

            <div class="content-area" id="contentArea">
                <!-- Content will be loaded here -->
            </div>

            <!-- Player -->
            <div class="player">
                <div class="track-image small" id="nowPlayingImage">
                    <i class="fas fa-music"></i>
                </div>
                <div class="track-info">
                    <div class="track-title" id="nowPlayingTitle">Select a song</div>
                    <div class="track-artist" id="nowPlayingArtist">--</div>
                </div>
                <div class="player-controls">
                    <button class="control-btn" id="prevBtn"><i class="fas fa-step-backward"></i></button>
                    <button class="control-btn play-btn" id="playBtn"><i class="fas fa-play"></i></button>
                    <button class="control-btn" id="nextBtn"><i class="fas fa-step-forward"></i></button>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="progressBar">
                        <div class="progress" id="progress"></div>
                    </div>
                    <div class="time">
                        <span id="currentTime">0:00</span>
                        <span id="duration">0:00</span>
                    </div>
                </div>
                <div class="volume-container">
                    <i class="fas fa-volume-up"></i>
                    <div class="volume-bar" id="volumeBar"></div>
                </div>
            </div>
        </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <script>
        // Sample music data (using free preview URLs)
        const musicData = [
            { id: 1, title: "Shape of You", artist: "Ed Sheeran", duration: "231", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 2, title: "Blinding Lights", artist: "The Weeknd", duration: "200", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 3, title: "Levitating", artist: "Dua Lipa", duration: "215", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 4, title: "Watermelon Sugar", artist: "Harry Styles", duration: "175", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 5, title: "Bad Habits", artist: "Ed Sheeran", duration: "231", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 6, title: "Stay", artist: "The Kid LAROI", duration: "170", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 7, title: "Good 4 U", artist: "Olivia Rodrigo", duration: "197", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" },
            { id: 8, title: "Peaches", artist: "Justin Bieber", duration: "198", image: "🎵", preview: "https://www.soundjay.com/misc/sounds/bell-ringing-05.wav" }
        ];

        let currentSongIndex = 0;
        let isPlaying = false;
        const audio = document.getElementById('audioPlayer');
        const playBtn = document.getElementById('playBtn');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');
        const progressBar = document.getElementById('progressBar');
        const progress = document.getElementById('progress');
        const currentTimeEl = document.getElementById('currentTime');
        const durationEl = document.getElementById('duration');
        const nowPlayingTitle = document.getElementById('nowPlayingTitle');
        const nowPlayingArtist = document.getElementById('nowPlayingArtist');
        const nowPlayingImage = document.getElementById('nowPlayingImage');
        const searchInput = document.getElementById('searchInput');
        const sidebar = document.getElementById('sidebar');
        const contentArea = document.getElementById('contentArea');

        // Initialize
        loadSection('home');
        setupEventListeners();

        function setupEventListeners() {
            // Navigation
            document.querySelectorAll('.nav-item[data-section]').forEach(item => {
                item.addEventListener('click', (e) => {
                    const section = e.currentTarget.dataset.section;
                    loadSection(section);
                    document.querySelectorAll('.nav-item').forEach(nav => nav.classList.remove('active'));
                    e.currentTarget.classList.add('active');
                });
            });

            // Sidebar toggle
            document.querySelector('.toggle-sidebar').addEventListener('click', () => {
                sidebar.classList.toggle('collapsed');
            });

            // Search
            searchInput.addEventListener('input', (e) => {
                const query = e.target.value.toLowerCase();
                loadSearchResults(query);
            });

            // Player controls
            playBtn.addEventListener('click', togglePlay);
            prevBtn.addEventListener('click', prevSong);
            nextBtn.addEventListener('click', nextSong);

            // Progress bar
            progressBar.addEventListener('click', setProgress);
            audio.addEventListener('timeupdate', updateProgress);
            audio.addEventListener('loadedmetadata', updateDuration);
            audio.addEventListener('ended', nextSong);

            // Volume
            document.getElementById('volumeBar').addEventListener('click', (e) => {
                const volume = e.offsetX / e.target.offsetWidth;
                audio.volume = volume;
            });
        }

        function loadSection(section) {
            let html = '';
            if (section === 'home') {
                html = `
                    <div class="section">
                        <h2>Popular Hits</h2>
                        <div class="tracks-grid" id="popularTracks">
                            ${musicData.slice(0, 4).map(track => createTrackCard(track)).join('')}
                        </div>
                    </div>
                    <div class="section">
                        <h2>Recently Played</h2>
                        <div class="tracks-grid">
                            ${musicData.slice(4).map(track => createTrackCard(track)).join('')}
                        </div>
                    </div>
                `;
            } else if (section === 'library') {
                html = `
                    <div class="section">
                        <h2>Your Library</h2>
                        <div class="tracks-grid">
                            ${musicData.map(track => createTrackCard(track)).join('')}
                        </div>
                    </div>
                `;
            }
            contentArea.innerHTML = html;
            attachTrackListeners();
        }

        function loadSearchResults(query) {
            if (query.length < 2) {
                loadSection('home');
                return;
            }
            const results = musicData.filter(track => 
                track.title.toLowerCase().includes(query) || 
                track.artist.toLowerCase().includes(query)
            );
            const html = `
                <div class="section">
                    <h2>Search Results (${results.length})</h2>
                    <div class="tracks-grid">
                        ${results.map(track => createTrackCard(track)).join('')}
                    </div>
                </div>
            `;
            contentArea.innerHTML = html;
            attachTrackListeners();
        }

        function createTrackCard(track) {
            return `
                <div class="track-card" data-track-id="${track.id}">
                    <div class="track-image">${track.image}</div>
                    <div class="track-title">${track.title}</div>
                    <div class="track-artist">${track.artist}</div>
                    <div style="margin-top: 10px; font-size: 12px; color: rgba(255,255,255,0.5);">
                        ${formatDuration(track.duration)}
                    </div>
                </div>
            `;
        }

        function attachTrackListeners() {
            document.querySelectorAll('.track-card').forEach(card => {
                card.addEventListener('click', () => {
                    const trackId = parseInt(card.dataset.trackId);
                    currentSongIndex = musicData.findIndex(t => t.id === trackId);
                    playSong(currentSongIndex);
                });
            });
        }

        function playSong(index) {
            const track = musicData[index];
            audio.src = track.preview;
            nowPlayingTitle.textContent = track.title;
            nowPlayingArtist.textContent = track.artist;
            nowPlayingImage.innerHTML = track.image;
            audio.play();
            isPlaying = true;
            playBtn.innerHTML = '<i class="fas fa-pause"></i>';
        }

        function togglePlay() {
            if (isPlaying) {
                audio.pause();
                playBtn.innerHTML = '<i class="fas fa-play"></i>';
                isPlaying = false;
            } else {
                audio.play();
                playBtn.innerHTML = '<i class="fas fa-pause"></i>';
                isPlaying = true;
            }
        }

        function prevSong() {
            currentSongIndex = (currentSongIndex - 1 + musicData.length) % musicData.length;
            playSong(currentSongIndex);
        }

        function nextSong() {
            currentSongIndex = (currentSongIndex + 1) % musicData.length;
            playSong(currentSongIndex);
        }

        function updateProgress() {
            if (audio.duration) {
                const progressPercent = (audio.currentTime / audio.duration) *
